<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title id="pageTitle">IDI Evolution — Nick Hauss</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;
  --glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.08);--glass3:rgba(255,255,255,0.13);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
  --text:#f0f4ff;--text2:#8892a4;--text3:#3d4a5c;
  --accent:#4f8ef7;--r:12px;--r2:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}

.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:272px;min-width:272px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform .25s;z-index:100;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;} .main>div[id$='Content']{overflow-y:auto;}

.sidebar-logo{padding:14px 14px 8px;border-bottom:1px solid var(--border);}
.sidebar-logo h1{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--accent);text-transform:uppercase;}
.sidebar-logo .name{font-size:14px;font-weight:700;color:var(--text);margin-top:1px;}
.sidebar-logo p{font-size:10px;color:var(--text2);}

.sidebar-search{padding:8px 10px;border-bottom:1px solid var(--border);}
.sidebar-search input{width:100%;background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);padding:7px 10px;color:var(--text);font-size:12px;outline:none;}
.sidebar-search input::placeholder{color:var(--text3);}
.sidebar-search input:focus{border-color:var(--border2);}

.filter-section{padding:6px 10px 5px;border-bottom:1px solid var(--border);}
.filter-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px;}
.filter-tags{display:flex;flex-wrap:wrap;gap:3px;}
.ft{padding:2px 7px;border-radius:20px;font-size:10px;cursor:pointer;border:1px solid transparent;transition:all .12s;user-select:none;}
.ft.active{border-color:currentColor;}
.ft-all{color:var(--text2);background:var(--glass);}
.ft-all.active{color:var(--text);background:var(--glass2);border-color:var(--border2);}
.ft-lead{color:#94a3b8;background:rgba(100,116,139,.15);}         .ft-lead.active{background:rgba(100,116,139,.3);}
.ft-appt1{color:#22d3ee;background:rgba(8,145,178,.15);}          .ft-appt1.active{background:rgba(8,145,178,.3);}
.ft-appt2{color:#06b6d4;background:rgba(14,116,144,.15);}         .ft-appt2.active{background:rgba(14,116,144,.3);}
.ft-lavorazione{color:#a78bfa;background:rgba(124,58,237,.15);}   .ft-lavorazione.active{background:rgba(124,58,237,.3);}
.ft-workshop{color:#fbbf24;background:rgba(217,119,6,.15);}       .ft-workshop.active{background:rgba(217,119,6,.3);}
.ft-demo{color:#34d399;background:rgba(5,150,105,.15);}           .ft-demo.active{background:rgba(5,150,105,.3);}
.ft-cliente{color:#4ade80;background:rgba(22,163,74,.15);}        .ft-cliente.active{background:rgba(22,163,74,.3);}
.ft-ripassare{color:#fb923c;background:rgba(251,146,60,.15);}     .ft-ripassare.active{background:rgba(251,146,60,.3);}
.ft-nontarget{color:#f87171;background:rgba(248,113,113,.15);}    .ft-nontarget.active{background:rgba(248,113,113,.3);}
.ft-expodental{color:#e879f9;background:rgba(232,121,249,.15);}   .ft-expodental.active{background:rgba(232,121,249,.3);}
.ft-davisitare{color:#38bdf8;background:rgba(56,189,248,.15);}   .ft-davisitare.active{background:rgba(56,189,248,.3);}
.ft-segnalati{color:#f59e0b;background:rgba(245,158,11,.15);}    .ft-segnalati.active{background:rgba(245,158,11,.3);}

.selects-row{display:flex;gap:4px;padding:6px 10px;border-bottom:1px solid var(--border);}
.selects-row select{flex:1;background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);padding:5px 6px;color:var(--text);font-size:10px;outline:none;cursor:pointer;min-width:0;}
.selects-row select option{background:var(--bg2);}

.contact-list{flex:1;overflow-y:auto;padding:4px;}
.contact-list::-webkit-scrollbar{width:3px;}
.contact-list::-webkit-scrollbar-thumb{background:var(--glass3);border-radius:3px;}
.ci{padding:8px 10px;border-radius:var(--r2);cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:all .1s;}
.ci:hover{background:var(--glass);border-color:var(--border);}
.ci.active{background:var(--glass2);border-color:var(--border2);}
.ci-top{display:flex;align-items:center;gap:6px;}
.ci-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ci-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.ci-sub{font-size:10px;color:var(--text2);margin-top:1px;padding-left:12px;}
.ci-step{font-size:10px;color:#fbbf24;padding-left:12px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Main nav tabs */
.main-header{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg2);flex-shrink:0;}
.hamburger{display:none;background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:0 4px;}
.tab-nav{display:flex;gap:4px;}
.tab-btn{background:var(--glass);border:1px solid var(--border);color:var(--text2);border-radius:var(--r2);padding:6px 12px;font-size:12px;cursor:pointer;transition:all .12s;white-space:nowrap;}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.header-right{display:flex;gap:6px;margin-left:auto;}
.btn-sync{background:var(--glass);border:1px solid var(--border);color:var(--text2);border-radius:var(--r2);padding:6px 10px;font-size:11px;cursor:pointer;white-space:nowrap;}
.btn-new{background:var(--accent);color:#fff;border:none;border-radius:var(--r2);padding:6px 12px;font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap;}

/* Prossimo step banner */
.step-banner{background:rgba(251,191,36,.06);border-bottom:1px solid rgba(251,191,36,.15);padding:8px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:36px;}
.step-banner-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#fbbf24;flex-shrink:0;}
.step-banner-text{font-size:12px;color:var(--text);flex:1;}
.step-banner-studio{font-size:11px;color:var(--text2);flex-shrink:0;}
.step-edit-btn{font-size:10px;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px;background:var(--glass);border:1px solid var(--border);flex-shrink:0;}

/* Profile */
.profile-view{flex:1;overflow-y:auto;padding:16px;}
.profile-view::-webkit-scrollbar{width:3px;}
.profile-view::-webkit-scrollbar-thumb{background:var(--glass3);border-radius:3px;}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:10px;}

.profile-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;}
.profile-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.profile-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
.profile-info{flex:1;margin-left:10px;}
.profile-info h2{font-size:17px;font-weight:700;outline:none;border-bottom:1px solid transparent;transition:border-color .15s;}
.profile-info h2:focus{border-bottom-color:var(--border2);}
.profile-info .dott{font-size:11px;color:var(--text2);}
.status-select{margin-top:5px;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:500;outline:none;cursor:pointer;border-width:1px;border-style:solid;}

/* Prossimo step nel profilo */
.step-card{background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.2);border-radius:var(--r2);padding:10px 14px;margin-bottom:12px;}
.step-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.step-card-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#fbbf24;font-weight:600;}
.step-card-edit{font-size:10px;color:var(--text2);cursor:pointer;padding:2px 8px;border-radius:4px;background:var(--glass);border:1px solid var(--border);}
.step-input{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:inherit;}
.step-text{font-size:13px;color:var(--text);cursor:pointer;}
.step-text.empty{color:var(--text3);font-style:italic;}

.profile-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.field-item{}.field-label{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:2px;}
.field-value{font-size:12px;color:var(--text);background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);padding:5px 9px;cursor:pointer;min-height:30px;transition:border-color .12s;word-break:break-word;}
.field-value:hover{border-color:var(--border2);}
.field-value.empty{color:var(--text3);font-style:italic;}
.field-value.editing{border-color:var(--accent);}
.field-value input,.field-value textarea{background:none;border:none;outline:none;color:var(--text);font-size:12px;width:100%;font-family:inherit;resize:none;}
.field-full{grid-column:1/-1;}
.map-links{display:flex;gap:6px;margin-top:4px;}
.map-link{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--accent);text-decoration:none;padding:2px 7px;background:rgba(79,142,247,.1);border-radius:6px;border:1px solid rgba(79,142,247,.2);}

/* Timeline */
.section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.btn-add-event{background:var(--glass);border:1px solid var(--border);color:var(--text2);border-radius:var(--r2);padding:3px 9px;font-size:11px;cursor:pointer;}
.btn-add-event:hover{background:var(--glass2);color:var(--text);}
.timeline-item{display:flex;gap:8px;margin-bottom:5px;}
.tl-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:26px;}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;border:2px solid var(--bg);}
.tl-line{width:2px;background:var(--border);flex:1;min-height:12px;}
.tl-card{flex:1;background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);padding:8px 11px;min-width:0;}
.tl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;flex-wrap:wrap;gap:4px;}
.tl-type{font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;white-space:nowrap;}
.tl-date{font-size:10px;color:var(--text2);}
.tl-note{font-size:12px;color:var(--text);line-height:1.5;word-break:break-word;}
.tl-actions{display:flex;gap:6px;align-items:center;}
.tl-delete{font-size:10px;color:var(--text3);cursor:pointer;padding:1px 4px;border-radius:3px;}
.tl-delete:hover{color:#ef4444;}
.gcal-btn{font-size:9px;color:#4285f4;text-decoration:none;padding:1px 5px;background:rgba(66,133,244,.1);border-radius:4px;border:1px solid rgba(66,133,244,.2);}

/* Dashboard */
.dashboard{flex:1;overflow-y:auto;padding:16px;}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px;}
.dash-stat{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;}
.dash-stat-n{font-size:28px;font-weight:700;}
.dash-stat-l{font-size:11px;color:var(--text2);margin-top:2px;}
.dash-chart-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px;}
.dash-chart-card h3{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;}
.chart-wrap{position:relative;height:180px;}
.step-list{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.step-list h3{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.step-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.step-row:last-child{border:none;}
.step-row:hover{opacity:.8;}
.step-row-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.step-row-info{flex:1;min-width:0;}
.step-row-studio{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.step-row-step{font-size:11px;color:#fbbf24;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.step-row-city{font-size:10px;color:var(--text2);flex-shrink:0;}

/* Reminder */
.reminder-card{background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.2);border-radius:var(--r);padding:14px;margin-bottom:14px;}
.reminder-card h3{font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.rem-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.rem-row:last-child{border:none;}
.rem-time{font-size:11px;color:var(--accent);width:80px;flex-shrink:0;}
.rem-studio{font-size:12px;font-weight:500;flex:1;}
.rem-note{font-size:10px;color:var(--text2);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
@media(min-width:600px){.modal-overlay{align-items:center;}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r) var(--r) 0 0;padding:18px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
@media(min-width:600px){.modal{border-radius:var(--r);}}
.modal h3{font-size:15px;font-weight:600;margin-bottom:12px;}
.modal-field{margin-bottom:10px;}
.modal-field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:4px;}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);padding:8px 10px;color:var(--text);font-size:13px;outline:none;font-family:inherit;resize:vertical;}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{border-color:var(--accent);}
.modal-field select option{background:var(--bg2);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.btn-cancel{background:var(--glass);border:1px solid var(--border);color:var(--text2);border-radius:var(--r2);padding:7px 13px;font-size:13px;cursor:pointer;}
.btn-save{background:var(--accent);border:none;color:#fff;border-radius:var(--r2);padding:7px 13px;font-size:13px;cursor:pointer;font-weight:500;}

.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;}
.no-results{text-align:center;padding:24px;color:var(--text2);font-size:12px;}
.notif-bar{background:rgba(79,142,247,.12);border-bottom:1px solid rgba(79,142,247,.2);padding:6px 18px;font-size:12px;color:var(--accent);display:none;align-items:center;gap:10px;}
.notif-bar button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;margin-left:auto;}

@media(max-width:680px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay.show{display:block;}
  .hamburger{display:block;}
  .profile-fields{grid-template-columns:1fr;}
  .tab-btn span{display:none;}
}

/* ── Calendar View ── */
.cal-wrap{flex:1;overflow-y:auto;padding:16px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-nav{display:flex;gap:6px;align-items:center;}
.cal-nav button{background:var(--glass);border:1px solid var(--border);color:var(--text);border-radius:var(--r2);padding:5px 10px;font-size:13px;cursor:pointer;}
.cal-nav button:hover{background:var(--glass2);}
.cal-month-label{font-size:16px;font-weight:700;min-width:180px;text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
.cal-day-name{text-align:center;font-size:10px;color:var(--text2);padding:4px 0;text-transform:uppercase;letter-spacing:.05em;}
.cal-day{min-height:72px;background:var(--glass);border:1px solid var(--border);border-radius:var(--r2);padding:4px;cursor:pointer;transition:all .12s;position:relative;}
.cal-day:hover{background:var(--glass2);border-color:var(--border2);}
.cal-day.today{border-color:var(--accent);background:rgba(79,142,247,.08);}
.cal-day.other-month{opacity:.35;}
.cal-day.selected{background:rgba(79,142,247,.15);border-color:var(--accent);}
.cal-day-num{font-size:11px;font-weight:600;margin-bottom:3px;}
.cal-day.today .cal-day-num{color:var(--accent);}
.cal-event-pill{font-size:9px;padding:1px 5px;border-radius:8px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.5;}
.cal-event-pill:hover{opacity:.8;}
.cal-more{font-size:9px;color:var(--text2);margin-top:1px;}
.cal-day-detail{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-top:14px;}
.cal-day-detail h3{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text2);}
.cal-event-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.cal-event-row:last-child{border:none;}
.cal-event-row:hover{opacity:.8;}
.cal-event-time{font-size:11px;color:var(--accent);width:70px;flex-shrink:0;font-weight:600;}
.cal-event-body{flex:1;min-width:0;}
.cal-event-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-event-sub{font-size:10px;color:var(--text2);margin-top:1px;}
.cal-gcal-link{font-size:10px;color:#4285f4;text-decoration:none;padding:1px 5px;background:rgba(66,133,244,.1);border-radius:4px;border:1px solid rgba(66,133,244,.2);flex-shrink:0;}
.view-toggle{display:flex;gap:4px;}
.view-btn{background:var(--glass);border:1px solid var(--border);color:var(--text2);border-radius:var(--r2);padding:4px 10px;font-size:11px;cursor:pointer;}
.view-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}


.todo-wrap{flex:1;overflow-y:auto;padding:16px;}
.todo-header-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.todo-title{font-size:16px;font-weight:700;flex:1;}
.todo-add-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--r2);padding:7px 14px;font-size:13px;cursor:pointer;font-weight:500;}
.todo-section{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.todo-section-title{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);}
.todo-item:last-child{border:none;}
.todo-item.done{opacity:.45;}
.todo-cb{width:18px;height:18px;min-width:18px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:10px;margin-top:1px;}
.todo-cb.checked{background:var(--accent);border-color:var(--accent);color:#fff;}
.todo-body{flex:1;min-width:0;cursor:pointer;}
.todo-text{font-size:13px;color:var(--text);}
.todo-item.done .todo-text{text-decoration:line-through;color:var(--text2);}
.todo-meta{font-size:10px;color:var(--text2);margin-top:2px;}
.todo-urgent-text{color:#f87171!important;font-weight:500;}
.todo-del{font-size:12px;color:var(--text3);cursor:pointer;padding:2px 5px;border-radius:4px;}
.todo-del:hover{color:#ef4444;}
.tab-nav{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap!important;}
.tab-nav::-webkit-scrollbar{display:none;}
@media(max-width:680px){
  .stats-bar{padding:6px 10px;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;}
  .stat-label{display:none;}

}


/* ── Scrolling fix for all content panels ── */
#mainContent, #dashContent, #calContent, #todoContent {
  flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
}
#mainContent::-webkit-scrollbar, #dashContent::-webkit-scrollbar,
#calContent::-webkit-scrollbar, #todoContent::-webkit-scrollbar { width:3px; }
#mainContent::-webkit-scrollbar-thumb, #dashContent::-webkit-scrollbar-thumb,
#calContent::-webkit-scrollbar-thumb, #todoContent::-webkit-scrollbar-thumb {
  background:var(--glass3); border-radius:3px;
}
/* Remove inner overflow since parent handles it */
.profile-view { overflow-y:unset; padding:16px; }
.dashboard { overflow-y:unset; padding:16px; }
.cal-wrap { overflow-y:unset; padding:16px; }
.todo-wrap { overflow-y:unset; padding:16px; }


/* ── KPI ── */
.kpi-wrap{flex:1;overflow-y:auto;padding:16px;}
.kpi-header-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.kpi-period{display:flex;gap:4px;margin-left:auto;}
.kpi-period button{background:var(--glass);border:1px solid var(--border);color:var(--text2);border-radius:var(--r2);padding:4px 10px;font-size:11px;cursor:pointer;}
.kpi-period button.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px;}
.kpi-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.kpi-card.blue::before{background:#4f8ef7;}
.kpi-card.green::before{background:#4ade80;}
.kpi-card.purple::before{background:#a78bfa;}
.kpi-card.orange::before{background:#fb923c;}
.kpi-card.yellow::before{background:#fbbf24;}
.kpi-card.pink::before{background:#e879f9;}
.kpi-n{font-size:32px;font-weight:800;margin-bottom:2px;}
.kpi-label{font-size:11px;color:var(--text2);}
.kpi-trend{font-size:10px;margin-top:4px;}
.kpi-trend.up{color:#4ade80;}
.kpi-trend.down{color:#f87171;}
.kpi-section{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.kpi-section h3{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.kpi-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.kpi-bar-label{font-size:11px;color:var(--text);width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.kpi-bar-bg{flex:1;background:var(--glass2);border-radius:4px;height:8px;overflow:hidden;}
.kpi-bar-fill{height:100%;border-radius:4px;transition:width .4s;}
.kpi-bar-val{font-size:11px;color:var(--text2);width:30px;text-align:right;flex-shrink:0;}
.kpi-funnel{display:flex;flex-direction:column;gap:4px;}
.kpi-funnel-step{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--r2);cursor:pointer;}
.kpi-funnel-step:hover{background:var(--glass2);}
.kpi-funnel-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.kpi-funnel-label{font-size:12px;flex:1;}
.kpi-funnel-count{font-size:14px;font-weight:700;}
.kpi-funnel-pct{font-size:10px;color:var(--text2);width:40px;text-align:right;}


.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--glass);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;margin-bottom:14px;transition:all .12s;}
.back-btn:hover{background:var(--glass2);color:var(--text);}
</style>
</head>

<script>
var navHistory = [];
var kpiPeriodGlobal = "all";

// ═══════════════════════
// CONFIG
// ═══════════════════════
const SC = {
  lead:        {label:'Lead',            color:'#94a3b8',bg:'rgba(100,116,139,.2)',dot:'#64748b'},
  appt1:       {label:'1° Appuntamento', color:'#22d3ee',bg:'rgba(8,145,178,.2)',  dot:'#0891b2'},
  appt2:       {label:'2° Appuntamento', color:'#06b6d4',bg:'rgba(14,116,144,.2)', dot:'#0e7490'},
  lavorazione: {label:'In Lavorazione',  color:'#a78bfa',bg:'rgba(124,58,237,.2)', dot:'#7c3aed'},
  workshop:    {label:'Workshop/Vision', color:'#fbbf24',bg:'rgba(217,119,6,.2)',  dot:'#d97706'},
  demo:        {label:'Demo',            color:'#34d399',bg:'rgba(5,150,105,.2)',  dot:'#059669'},
  cliente:     {label:'Cliente Attivo',  color:'#4ade80',bg:'rgba(22,163,74,.2)',  dot:'#16a34a'},
  ripassare:   {label:'↩ Ripassare',    color:'#fb923c',bg:'rgba(251,146,60,.2)', dot:'#ea580c'},
  nontarget:   {label:'✕ Non Target',   color:'#f87171',bg:'rgba(248,113,113,.2)',dot:'#dc2626'},
  expodental:  {label:'⭐ Expodental',   color:'#e879f9',bg:'rgba(232,121,249,.2)',dot:'#a855f7'},
  davisitare:  {label:'📍 Da Visitare',  color:'#38bdf8',bg:'rgba(56,189,248,.2)',  dot:'#0ea5e9'},
  segnalati:   {label:'\u2B50 Segnalati',    color:'#f59e0b',bg:'rgba(245,158,11,.2)',  dot:'#d97706'},
};
const EV_COLORS = {
  'Lead':{color:'#94a3b8',bg:'rgba(100,116,139,.15)',dot:'#64748b'},
  '1° Appuntamento':{color:'#22d3ee',bg:'rgba(8,145,178,.15)',dot:'#0891b2'},
  '2° Appuntamento':{color:'#06b6d4',bg:'rgba(14,116,144,.15)',dot:'#0e7490'},
  'In Lavorazione':{color:'#a78bfa',bg:'rgba(124,58,237,.15)',dot:'#7c3aed'},
  'Workshop/Vision':{color:'#fbbf24',bg:'rgba(217,119,6,.15)',dot:'#d97706'},
  'Demo':{color:'#34d399',bg:'rgba(5,150,105,.15)',dot:'#059669'},
  'Firma':{color:'#4ade80',bg:'rgba(22,163,74,.15)',dot:'#16a34a'},
  'Visita':{color:'#7dd3fc',bg:'rgba(14,165,233,.15)',dot:'#0ea5e9'},
  'Telefonata':{color:'#fdba74',bg:'rgba(249,115,22,.15)',dot:'#f97316'},
  'Email':{color:'#c4b5fd',bg:'rgba(139,92,246,.15)',dot:'#8b5cf6'},
  'Follow-up':{color:'#fca5a5',bg:'rgba(239,68,68,.15)',dot:'#ef4444'},
  'Note':{color:'#d1d5db',bg:'rgba(156,163,175,.15)',dot:'#9ca3af'},
  'Expodental':{color:'#e879f9',bg:'rgba(232,121,249,.15)',dot:'#a855f7'},
};
const EVENT_TYPES = ['Visita','Lead','Telefonata','Email','1° Appuntamento','2° Appuntamento','In Lavorazione','Workshop/Vision','Demo','Expodental','Firma','Follow-up','Note'];
const INTERESSE_OPTIONS = ['','2DGuide','Invisalign ART','B2TWO','Protesi','Certificazione'];

let contacts=[], activeFilter='all', selectedId=null, nextId=300, syncTimer=null, activeTab='contacts';
let chartWeek=null, chartMonth=null, chartStatus=null;

// Google Sheets URL (set after Apps Script setup)
let GS_URL = localStorage.getItem('idi_gs_url') || '';
function setGoogleSheetsUrl(url){ GS_URL=url.trim(); localStorage.setItem('idi_gs_url',GS_URL); alert('✅ Google Sheets URL salvato!'); }
async function saveToGoogleSheets(data){
  if(!GS_URL) return false;
  try{ await fetch(GS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'save',data:JSON.stringify(data)})}); return true; }catch(e){ return false; }
}
async function loadFromGoogleSheets(){
  if(!GS_URL) return null;
  try{ const r=await fetch(GS_URL+'?action=load',{mode:'cors'}); const j=await r.json(); return j.data?JSON.parse(j.data):null; }catch(e){ return null; }
}
function getCRMTitle(){ return localStorage.getItem('idi_crm_title')||'CRM Studi Dentistici'; }
function setCRMTitle(t){ localStorage.setItem('idi_crm_title',t); const el=document.querySelector('.crm-main-title'); if(el)el.textContent=t; document.getElementById('pageTitle').textContent='IDI Evolution — '+t; }

// ═══════════════════════
// CLOUD SYNC
// ═══════════════════════
const SKEY = 'idi_crm_v4';
async function loadFromCloud(){
  setSyncStatus('ing','...');
  try {
    const res = await window.storage.get(SKEY);
    if(res && res.value){ contacts=JSON.parse(res.value); nextId=Math.max(nextId,...contacts.map(c=>c.id))+1; setSyncStatus('ok','☁ Sync ✓'); }
    else { contacts=buildInitialData(); await saveToCloud(); }
  } catch(e) {
    try{ const l=localStorage.getItem('idi_crm_v3'); contacts=l?JSON.parse(l):buildInitialData(); }catch(_){ contacts=buildInitialData(); }
    setSyncStatus('err','⚠ Offline');
    showNotifBar('Sei offline. I dati sono salvati localmente.');
  }
  populateCityFilter(); renderStats_sidebar(); renderList(); updateStepBanner(); checkReminders(); setTimeout(loadTodos,100); setTimeout(fetchLiveCalendar,2000); setTimeout(fetchLiveCalendar, 2000);
}
async function saveToCloud(){
  try{ localStorage.setItem('idi_crm_v3',JSON.stringify(contacts)); }catch(_){}
  try{ await window.storage.set(SKEY,JSON.stringify(contacts)); setSyncStatus('ok','☁ Salvato'); }
  catch(e){ setSyncStatus('err','⚠ Offline'); }
  if(GS_URL) saveToGoogleSheets(contacts); // async, non-blocking
}
function scheduleSave(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(function(){
    saveToCloud();
    if(GS_URL) saveToGoogleSheets(contacts);
  },2000);
}
setInterval(function(){ if(GS_URL&&contacts&&contacts.length) saveToGoogleSheets(contacts); },60000);
async function syncNow(){
  setSyncStatus('ing','↻...');
  if(GS_URL){
    // Try load from Google Sheets first
    const remote = await loadFromGoogleSheets();
    if(remote && remote.length){ contacts=remote; nextId=Math.max(nextId,...contacts.map(x=>x.id))+1; renderList(); populateCityFilter(); updateStepBanner(); setSyncStatus('ok','☁ GSheets ✓'); return; }
  }
  await saveToCloud();
}
function setSyncStatus(t,txt){
  const b=document.getElementById('syncBtn'); b.textContent=txt;
  if(t==='ok') setTimeout(()=>{ b.textContent='☁'; },2500);
}

// ═══════════════════════
// NOTIFICATIONS
// ═══════════════════════
function showNotifBar(msg){
  const bar=document.getElementById('notifBar');
  document.getElementById('notifText').textContent=msg;
  bar.style.display='flex';
}
function requestNotifPerm(){
  if(!('Notification' in window)){ alert('Notifiche non supportate su questo browser'); return; }
  Notification.requestPermission().then(p=>{
    document.getElementById('notifBar').style.display='none';
    if(p==='granted'){ sendNotification('IDI CRM','Notifiche attivate! Riceverai reminder per gli appuntamenti.'); checkReminders(); }
  });
}
function sendNotification(title, body){
  if(Notification.permission==='granted'){ new Notification(title,{body,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><text y="24" font-size="24">🦷</text></svg>'}); }
}
function checkReminders(){
  if(!('Notification' in window)) return;
  if(Notification.permission!=='granted'){
    showNotifBar('Attiva le notifiche per ricevere reminder sugli appuntamenti prossimi');
    return;
  }
  const now=new Date();
  const in24h=new Date(now.getTime()+24*60*60*1000);
  contacts.forEach(c=>{
    (c.eventi||[]).forEach(ev=>{
      if(!ev.date) return;
      const d=new Date(ev.date);
      if(d>now && d<=in24h && (ev.type==='1° Appuntamento'||ev.type==='2° Appuntamento'||ev.type==='Demo'||ev.type==='Workshop/Vision')){
        const h=Math.round((d-now)/3600000);
        sendNotification(`⏰ ${ev.type} tra ${h}h`,`${c.studio}${ev.note?' — '+ev.note.slice(0,60):''}`);
      }
    });
  });
  // Schedule next check
  setTimeout(checkReminders, 30*60*1000);
}

// ═══════════════════════
// STEP BANNER (global)
// ═══════════════════════
function updateStepBanner(){
  // Find contact with next step that has the most urgent context
  const withSteps = contacts.filter(c=>c.prossimo_step&&c.prossimo_step.trim());
  const banner = document.getElementById('stepBanner');
  if(!withSteps.length){ banner.style.display='none'; return; }
  // Show selected contact's step if one is selected, else show first
  const target = withSteps.find(c=>c.id===selectedId) || withSteps[0];
  banner.style.display='flex';
  document.getElementById('stepBannerText').textContent=target.prossimo_step;
  document.getElementById('stepBannerStudio').textContent=target.studio;
}

// ═══════════════════════
// TABS
// ═══════════════════════
function switchTab(tab, btn){
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  var sections = ['mainContent','dashContent','calContent','todoContent','kpiContent','itinerarioContent','recapContent','reportContent'];
  sections.forEach(function(id){ var el=document.getElementById(id); if(el) el.style.display='none'; });
  if(tab==='contacts'){
    document.getElementById('mainContent').style.display='';
  } else if(tab==='dashboard'){
    document.getElementById('dashContent').style.display='';
    renderDashboard();
  } else if(tab==='calendar'){
    document.getElementById('calContent').style.display='';
    renderCalendar();
    fetchLiveCalendar();
  } else if(tab==='todo'){
    document.getElementById('todoContent').style.display='';
    renderTodo();
  } else if(tab==='kpi'){
    document.getElementById('kpiContent').style.display='';
    renderKPI();
  } else if(tab==='itinerario'){
    document.getElementById('itinerarioContent').style.display='';
    renderItinerario();
  } else if(tab==='recap'){
    document.getElementById('recapContent').style.display='';
    renderRecap();
  } else if(tab==='report'){
    document.getElementById('reportContent').style.display='';
    renderReport();
  }
}


// ═══════════════════════
// FILTER
// ═══════════════════════
document.getElementById('filterTags').addEventListener('click',e=>{
  const el=e.target.closest('.ft'); if(!el) return;
  document.querySelectorAll('.ft').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); activeFilter=el.dataset.f; renderList();
});

function getFiltered(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const city=document.getElementById('cityFilter').value;
  const month=document.getElementById('monthFilter').value;
  const year=document.getElementById('yearFilter').value;
  return contacts.filter(c=>{
    if(activeFilter!=='all'&&c.status!==activeFilter) return false;
    if(city&&c.citta!==city) return false;
    if(q&&!c.studio.toLowerCase().includes(q)&&!c.dott.toLowerCase().includes(q)&&!c.citta.toLowerCase().includes(q)) return false;
    if(month||year){
      const match=(c.eventi||[]).some(ev=>{
        if(!ev.date) return false;
        const d=new Date(ev.date);
        if(month&&String(d.getMonth()+1)!==month) return false;
        if(year&&String(d.getFullYear())!==year) return false;
        return true;
      });
      if(!match) return false;
    }
    return true;
  });
}

// ═══════════════════════
// RENDER LIST
// ═══════════════════════
function renderList(){
  const filtered=getFiltered();
  // contact count updated in headerSub
  const list=document.getElementById('contactList');
  if(!filtered.length){list.innerHTML='<div class="no-results">Nessun risultato</div>';return;}
  list.innerHTML=filtered.map(c=>{
    const sc=SC[c.status]||SC.lead;
    const lastEv=(c.eventi||[]).slice(-1)[0];
    const lastDate=lastEv?formatDateShort(lastEv.date):'';
    return `<div class="ci ${c.id===selectedId?'active':''}" onclick="selectContact(${c.id});closeSidebar()">
      <div class="ci-top"><div class="ci-dot" style="background:${sc.dot}"></div><div class="ci-name">${c.studio}</div></div>
      <div class="ci-sub">${c.citta||'—'}${lastDate?' · '+lastDate:''}</div>
      ${c.prossimo_step?`<div class="ci-step">▶ ${c.prossimo_step}</div>`:''}
    </div>`;
  }).join('');
}

function renderStats_sidebar(){ /* minimal */ }

// ═══════════════════════
// PROFILE
// ═══════════════════════
function selectContact(id){
  selectedId=id;
  renderList();
  const c=contacts.find(x=>x.id===id);
  if(!c) return;
  updateStepBanner();
  renderProfile(c);
}

function renderProfile(c){
  if(typeof pushHistory==="function") pushHistory('contacts',c.id);
  if(activeTab==='dashboard') switchTab('contacts',document.querySelector('.tab-btn'));

// GOOGLE CALENDAR LINK
// ═══════════════════════
function makeGCalUrl(ev, c){
  const title=encodeURIComponent(`${ev.type} — ${c.studio}`);
  const details=encodeURIComponent(ev.note||'');
  const loc=encodeURIComponent([c.via,c.citta].filter(Boolean).join(', '));
  let dates='';
  if(ev.date){
    const d=new Date(ev.date);
    const pad=n=>String(n).padStart(2,'0');
    const fmt=dt=>`${dt.getUTCFullYear()}${pad(dt.getUTCMonth()+1)}${pad(dt.getUTCDate())}T${pad(dt.getUTCHours())}${pad(dt.getUTCMinutes())}00Z`;
    const start=new Date(d.getTime());
    const end=new Date(d.getTime()+60*60*1000);
    dates=`${fmt(start)}/${fmt(end)}`;
  }
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&details=${details}&location=${loc}&dates=${dates}`;
}

function fld(cid,key,label,val,type='text'){
  const isEmpty=!val;
  let display=val||'—';
  if(type==='tel'&&val) display=`<a href="tel:${val}" style="color:inherit;text-decoration:none">${val}</a>`;
  if(type==='email'&&val) display=`<a href="mailto:${val}" style="color:var(--accent);text-decoration:none">${val}</a>`;
  return `<div class="field-item"><div class="field-label">${label}</div>
    <div class="field-value ${isEmpty?'empty':''}" onclick="editField(${cid},'${key}',this)">${display}</div></div>`;
}
function editField(cid,key,el){
  if(el.querySelector('input')) return;
  const c=contacts.find(x=>x.id===cid); const val=c[key]||'';
  el.classList.add('editing');el.classList.remove('empty');
  el.innerHTML=`<input type="text" value="${val.replace(/"/g,'&quot;')}" onblur="saveField(${cid},'${key}',this)" onkeydown="if(event.key==='Enter')this.blur()">`;
  el.querySelector('input').focus();
}
function editNote(cid,key,el){
  if(el.querySelector('textarea')) return;
  const c=contacts.find(x=>x.id===cid); const val=c[key]||'';
  el.classList.add('editing');el.classList.remove('empty');
  el.innerHTML=`<textarea rows="3" onblur="saveField(${cid},'${key}',this)">${val}</textarea>`;
  el.querySelector('textarea').focus();
}
function saveField(cid,key,input){ updateField(cid,key,input.value); selectContact(cid); }
function updateField(cid,key,val){ const c=contacts.find(x=>x.id===cid); if(c){c[key]=val;scheduleSave();} }
function updateStatus(cid,val){ const c=contacts.find(x=>x.id===cid); if(c){c.status=val;scheduleSave();renderList();} }
function deleteEvent(cid,evid){ const c=contacts.find(x=>x.id===cid); if(!c) return; c.eventi=(c.eventi||[]).filter(e=>String(e.id)!==String(evid)); scheduleSave();selectContact(cid); }

// ═══════════════════════
// DASHBOARD
// ═══════════════════════
function renderDashboard(){
  if(typeof pushHistory==="function") pushHistory('dashboard',null);
  const dash=document.getElementById('dashContent');

  // Stats
  const counts={}; Object.keys(SC).forEach(k=>counts[k]=0);
  contacts.forEach(c=>counts[c.status]=(counts[c.status]||0)+1);
  const totalVisits=contacts.reduce((s,c)=>(s+(c.eventi||[]).filter(e=>['Visita','1° Appuntamento','2° Appuntamento','Demo'].includes(e.type)).length),0);
  const clienti=counts.cliente||0;
  const pipeline=contacts.filter(c=>['appt1','appt2','lavorazione'].includes(c.status)).length;
  const withSteps=contacts.filter(c=>c.prossimo_step&&c.prossimo_step.trim());

  // Weekly visits (last 8 weeks)
  const weekLabels=[], weekData=[];
  for(let w=7;w>=0;w--){
    const start=new Date(); start.setDate(start.getDate()-w*7-start.getDay()); start.setHours(0,0,0,0);
    const end=new Date(start); end.setDate(end.getDate()+7);
    const label=`${start.getDate()}/${start.getMonth()+1}`;
    weekLabels.push(label);
    let cnt=0;
    contacts.forEach(c=>(c.eventi||[]).forEach(ev=>{
      if(!ev.date) return;
      const d=new Date(ev.date);
      if(d>=start&&d<end&&['Visita','1° Appuntamento','2° Appuntamento','Demo'].includes(ev.type)) cnt++;
    }));
    weekData.push(cnt);
  }

  // Monthly visits (last 6 months)
  const mNames=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  const monthLabels=[], monthData=[];
  const now=new Date();
  for(let m=5;m>=0;m--){
    const d=new Date(now.getFullYear(),now.getMonth()-m,1);
    monthLabels.push(mNames[d.getMonth()]+' '+String(d.getFullYear()).slice(2));
    let cnt=0;
    contacts.forEach(c=>(c.eventi||[]).forEach(ev=>{
      if(!ev.date) return;
      const ed=new Date(ev.date);
      if(ed.getMonth()===d.getMonth()&&ed.getFullYear()===d.getFullYear()&&['Visita','1° Appuntamento','2° Appuntamento','Demo'].includes(ev.type)) cnt++;
    }));
    monthData.push(cnt);
  }

  // Upcoming (next 14 days)
  const upcoming=[];
  const in14=new Date(now.getTime()+14*24*60*60*1000);
  contacts.forEach(c=>(c.eventi||[]).forEach(ev=>{
    if(!ev.date) return;
    const d=new Date(ev.date);
    if(d>now&&d<=in14&&['1° Appuntamento','2° Appuntamento','Demo','Workshop/Vision','Expodental'].includes(ev.type))
      upcoming.push({studio:c.studio,date:ev.date,type:ev.type,note:ev.note,cid:c.id});
  }));
  upcoming.sort((a,b)=>new Date(a.date)-new Date(b.date));

  dash.innerHTML=`<div class="dashboard">
    <div class="dash-grid">
      <div class="dash-stat"><div class="dash-stat-n" style="color:#4f8ef7">${contacts.length}</div><div class="dash-stat-l">Tot. studi</div></div>
      <div class="dash-stat"><div class="dash-stat-n" style="color:#4ade80">${clienti}</div><div class="dash-stat-l">Clienti attivi</div></div>
      <div class="dash-stat"><div class="dash-stat-n" style="color:#a78bfa">${pipeline}</div><div class="dash-stat-l">In pipeline</div></div>
      <div class="dash-stat"><div class="dash-stat-n" style="color:#22d3ee">${totalVisits}</div><div class="dash-stat-l">Visite totali</div></div>
    </div>

    ${upcoming.length?`<div class="reminder-card">
      <h3>📅 Prossimi appuntamenti (14 giorni)</h3>
      ${upcoming.map(u=>`<div class="rem-row" onclick="selectContact(${u.cid});switchTab('contacts',document.querySelector('.tab-btn'))">
        <div class="rem-time">${formatDate(u.date)}</div>
        <div>
          <div class="rem-studio">${u.studio}</div>
          <div class="rem-note">${u.type}${u.note?' · '+u.note.slice(0,50):''}</div>
        </div>
      </div>`).join('')}
    </div>`:''}

    <div class="dash-chart-card">
      <h3>Visite settimanali (ultime 8 settimane)</h3>
      <div class="chart-wrap"><canvas id="chartWeek"></canvas></div>
    </div>
    <div class="dash-chart-card">
      <h3>Visite mensili (ultimi 6 mesi)</h3>
      <div class="chart-wrap"><canvas id="chartMonth"></canvas></div>
    </div>

    ${withSteps.length?`<div class="step-list">
      <h3>▶ Prossimi Step da fare</h3>
      ${withSteps.map(c=>{const sc=SC[c.status]||SC.lead;return`<div class="step-row" onclick="selectContact(${c.id});switchTab('contacts',document.querySelector('.tab-btn'))">
        <div class="step-row-dot" style="background:${sc.dot}"></div>
        <div class="step-row-info">
          <div class="step-row-studio">${c.studio}</div>
          <div class="step-row-step">${c.prossimo_step}</div>
        </div>
        <div class="step-row-city">${c.citta||'—'}</div>
      </div>`}).join('')}
    </div>`:''}
  </div>`;

  // Draw charts after DOM
  setTimeout(()=>{
    const chartCfg=(labels,data,label)=>({
      type:'bar',data:{labels,datasets:[{label,data,backgroundColor:'rgba(79,142,247,0.5)',borderColor:'#4f8ef7',borderWidth:1,borderRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#8892a4',font:{size:10}}},
                y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#8892a4',font:{size:10},stepSize:1}}}}
    });
    if(chartWeek){chartWeek.destroy();}
    if(chartMonth){chartMonth.destroy();}
    const cw=document.getElementById('chartWeek');
    const cm=document.getElementById('chartMonth');
    if(cw) chartWeek=new Chart(cw,chartCfg(weekLabels,weekData,'Visite'));
    if(cm) chartMonth=new Chart(cm,chartCfg(monthLabels,monthData,'Visite'));
  },100);
}

function formatDate(s){
  if(!s) return '';
  try{const d=new Date(s);return d.toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'})+(s.includes('T')&&!s.endsWith('T00:00')?' '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}):'');}catch(e){return s;}
}
function formatDateShort(s){
  if(!s) return '';
  try{const d=new Date(s);return d.toLocaleDateString('it-IT',{day:'2-digit',month:'short'});}catch(e){return '';}
}

        contatto_diretto:'',tel_professionista:'',n_riuniti:'',tipologia_impianti:'',
        specializzazione:'',interesse:'',eventi:[]});
    });
    var _vcf = JSON.parse(document.getElementById('d_vcf').textContent);
    var _vcfId=Math.max.apply(null,[...baseResult,...extraStudios].map(function(x){return x.id;}))+700;

      if(t)Object.assign(t,e.updates);

  // Load additional studios from research
    var _new = JSON.parse(document.getElementById('d_new').textContent);
    var _newId = Math.max.apply(null,[...baseResult,...extraStudios].map(function(x){return x.id;}))+900;
    _new.forEach(function(d){
      var last = d.studio.split(' ').pop().toLowerCase();
      var all = [...baseResult,...extraStudios];
      var ex = all.some(function(r){
        return (r.studio.toLowerCase().indexOf(last)>=0 && r.citta===d.citta && last.length>3) ||
               r.studio.toLowerCase()===d.studio.toLowerCase();
      });
      if(!ex){

          mail:'', note:d.note||'', via:d.via||'', sito:d.sito||'', anno_nascita:'',

          contatto_diretto:'', tel_professionista:'', n_riuniti:'',
          tipologia_impianti:'', specializzazione:d.specializzazione||'', interesse:'', eventi:[]
        });
      } else {
        // Enrich existing with missing data
        var existing = all.find(function(r){ return r.studio.toLowerCase()===d.studio.toLowerCase(); });
        if(existing){
          if(d.tel && !existing.tel) existing.tel = d.tel;
          if(d.via && !existing.via) existing.via = d.via;
          if(d.sito && !existing.sito) existing.sito = d.sito;
          if(d.note && !existing.note) existing.note = d.note;
          if(d.specializzazione && !existing.specializzazione) existing.specializzazione = d.specializzazione;
        }
      }
    });
  } catch(err){console.warn('Extra data:',err);}

  return [...baseResult, ...extraStudios];
}

    <h3>🗺 Crea Itinerario Visita</h3>

    <div class="modal-field"><label>Città</label>
      <select id="itiCity"><option value="">Tutte</option>${cities.map(c=>`<option>${c}</option>`).join('')}</select></div>

function generateItinerario(){
  const city=document.getElementById('itiCity').value;
  const start=document.getElementById('itiStart').value.trim();
  let targets=contacts.filter(c=>c.status==='davisitare');
  if(city) targets=targets.filter(c=>c.citta===city);
  const withAddr=targets.filter(c=>c.via||c.citta);
  if(!withAddr.length){alert('Nessuno studio "Da Visitare" con indirizzo trovato per questa selezione.');return;}
  // Build Google Maps directions URL (max ~10 waypoints for GM)
  const stops=withAddr.slice(0,9).map(c=>encodeURIComponent([c.via,c.citta].filter(Boolean).join(', ')));
  const origin=start?encodeURIComponent(start):stops.shift();
  const dest=stops.pop()||origin;
  const waypoints=stops.join('|');
  const url=`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}${waypoints?'&waypoints='+waypoints:''}&travelmode=driving`;
  window.open(url,'_blank');
  closeModal();
}

var calDate = new Date();
var calSelectedDay = null;
var calView = 'month';

// Load Google Calendar events from embedded JSON
var gcalEvents = [];
try { gcalEvents = JSON.parse(document.getElementById('d_gcal').textContent); } catch(e){}

// Also build events from CRM contacts
function getCRMCalEvents() {
  var evs = [];
  contacts.forEach(function(c){
    (c.eventi||[]).forEach(function(ev){
      if(!ev.date) return;
      var types = ['1° Appuntamento','2° Appuntamento','Demo','Workshop/Vision','Expodental','Firma'];
      if(types.indexOf(ev.type) < 0) return;
      evs.push({
        title: ev.type + ' — ' + c.studio,
        start: ev.date,
        color: (SC[c.status]||SC.lead).dot,
        cid: c.id,
        note: ev.note
      });
    });
  });
  return evs;
}

function getAllCalEvents() {
  return gcalEvents.concat(getCRMCalEvents());
}

function renderCalendar() {
  var el = document.getElementById('calContent');
  if(!el) return;
  var allEvs = getAllCalEvents();
  
  var y = calDate.getFullYear(), m = calDate.getMonth();
  var monthNames = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                    'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  var dayNames = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
  
  // First day of month, last day
  var firstDay = new Date(y, m, 1);
  var lastDay = new Date(y, m+1, 0);
  // Start from Monday
  var startDow = (firstDay.getDay()+6)%7;
  
  // Build day cells
  var cells = '';
  // Header
  var header = dayNames.map(function(d){ return '<div class="cal-day-name">'+d+'</div>'; }).join('');
  
  var today = new Date();
  var todayStr = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  
  // Previous month padding
  var prevLast = new Date(y, m, 0);
  for(var i=startDow-1; i>=0; i--) {
    var d = prevLast.getDate()-i;
    cells += '<div class="cal-day other-month"><div class="cal-day-num">'+d+'</div></div>';
  }
  
  // Current month days
  for(var day=1; day<=lastDay.getDate(); day++) {
    var dateStr = y+'-'+String(m+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    var isToday = dateStr === todayStr;
    var isSel = calSelectedDay === dateStr;
    var cls = 'cal-day'+(isToday?' today':'')+(isSel?' selected':'');
    
    // Get events for this day
    var dayEvs = allEvs.filter(function(e){
      if(!e.start) return false;
      var s = e.start.substring(0,10);
      if(s === dateStr) return true;
      // Multi-day events: check if dateStr is within start..end range
      if(e.end && e.end.length >= 10) {
        var endStr = e.end.substring(0,10);
        if(dateStr > s && dateStr < endStr) return true;
        // allDay: end is exclusive, so include up to but not including end
        if(e.allDay && dateStr >= s && dateStr < endStr) return true;
      }
      return false;
    });
    
    var pillsHtml = dayEvs.slice(0,3).map(function(e){
      return '<div class="cal-event-pill" style="background:'+e.color+'22;color:'+e.color+'" title="'+e.title+'">'+e.title+'</div>';
    }).join('');
    if(dayEvs.length > 3) pillsHtml += '<div class="cal-more">+' + (dayEvs.length-3) + ' altri</div>';
    
    cells += '<div class="'+cls+'" data-date="'+dateStr+'" onclick="selectCalDay(this.dataset.date)">'+
      '<div class="cal-day-num">'+day+'</div>'+
      pillsHtml+
      '</div>';
  }
  
  // Next month padding
  var totalCells = startDow + lastDay.getDate();
  var remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for(var nd=1; nd<=remaining; nd++) {
    cells += '<div class="cal-day other-month"><div class="cal-day-num">'+nd+'</div></div>';
  }
  
  // Day detail panel
  var detailHtml = '';
  if(calSelectedDay) {
    var selEvs = allEvs.filter(function(e){ return e.start && e.start.substring(0,10)===calSelectedDay; });
    selEvs.sort(function(a,b){ return a.start < b.start ? -1 : 1; });
    var selDateLabel = new Date(calSelectedDay+'T12:00:00').toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    var rows = selEvs.map(function(e){
      var isAllDay = e.allDay || (e.start && e.start.length <= 10);
    var time = isAllDay ? 'Tutto il giorno' : (e.start && e.start.length > 10 ? e.start.substring(11,16) : 'Tutto il giorno');
      var gcalUrl = makeGCalUrlFromEvent(e);
      return '<div class="cal-event-row" onclick="'+(e.cid?'selectContact('+e.cid+')':'')+'">'+
        '<div class="cal-event-time">'+time+'</div>'+
        '<div class="cal-event-body">'+
          '<div class="cal-event-title" style="color:'+e.color+'">'+e.title+'</div>'+
          (e.note?'<div class="cal-event-sub">'+e.note.slice(0,80)+'</div>':'')+
        '</div>'+
        '<a href="'+gcalUrl+'" target="_blank" class="cal-gcal-link" onclick="event.stopPropagation()">📅</a>'+
        '</div>';
    }).join('') || '<div style="color:var(--text3);font-size:12px;padding:8px 0">Nessun evento</div>';
    detailHtml = '<div class="cal-day-detail"><h3>'+selDateLabel+'</h3>'+rows+'</div>';
  }
  
  el.innerHTML = '<div class="cal-wrap">'+
    '<div class="cal-header">'+
      '<div class="cal-nav">'+
        '<button onclick="calNav(-1)">‹</button>'+
        '<span class="cal-month-label">'+monthNames[m]+' '+y+'</span>'+
        '<button onclick="calNav(1)">›</button>'+
        '<button onclick="calGoToday()" style="font-size:11px;margin-left:4px">Oggi</button>'+
      '</div>'+
    '</div>'+
    '<div class="cal-grid">'+header+cells+'</div>'+
    detailHtml+
    '</div>';
}

function makeGCalUrlFromEvent(e) {
  var title = encodeURIComponent(e.title||'');
  var note = encodeURIComponent(e.note||'');
  var dates = '';
  if(e.start) {
    var s = e.start.replace(/[-:]/g,'').replace('T','T');
    if(s.length <= 8) {
      dates = s + '/' + (e.end||e.start).replace(/[-:]/g,'');
    } else {
      var sd = new Date(e.start);
      var ed = e.end ? new Date(e.end) : new Date(sd.getTime()+3600000);
      var fmt = function(d){ return d.toISOString().replace(/[-:]/g,'').replace(/\..*$/,'')+'Z'; };
      dates = fmt(sd)+'/'+fmt(ed);
    }
  }
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE&text='+title+'&details='+note+'&dates='+dates;
}

function selectCalDay(dateStr) {
  calSelectedDay = dateStr;
  renderCalendar();
}

function calNav(dir) {
  calDate.setMonth(calDate.getMonth()+dir);
  renderCalendar();
}

function calGoToday() {
  calDate = new Date();
  calSelectedDay = null;
  renderCalendar();
}


// ─── LIVE GOOGLE CALENDAR FETCH ───
async function fetchLiveCalendar(){
  if(!GS_URL) return;
  try {
    setSyncStatus('ing','...');
    var r = await fetch(GS_URL+'?action=gcal', {mode:'cors'});
    var j = await r.json();
    if(j.events && j.events.length){
      // Replace gcalEvents with live data (always fresh)
      var liveEvents = j.events.map(function(ev){
        var startRaw = ev.start || '';
        var endRaw = ev.end || '';
        // Convert ISO to local datetime string
        var startLocal = startRaw.length > 10
          ? new Date(startRaw).toLocaleString('sv-SE',{timeZone:'Europe/Rome'}).substring(0,16).replace(' ','T')
          : startRaw.substring(0,10);
        var endLocal = endRaw.length > 10
          ? new Date(endRaw).toLocaleString('sv-SE',{timeZone:'Europe/Rome'}).substring(0,16).replace(' ','T')
          : endRaw.substring(0,10);
        // Pick color by title keywords
        var title = ev.title || '';
        var color = '#22d3ee';
        if(/OCCUPATO/i.test(title)) color='#64748b';
        else if(/VISION/i.test(title)) color='#fbbf24';
        else if(/EXPO/i.test(title)) color='#e879f9';
        else if(/CERTIF/i.test(title)) color='#34d399';
        else if(/AZIENDA/i.test(title)) color='#f59e0b';
        else if(/Chiama|chiama|Manda|manda|Richiama/i.test(title)) color='#fb923c';
        else if(/Barber/i.test(title)) color='#94a3b8';
        return {
          title: title,
          start: startLocal,
          end: endLocal,
          note: ev.note || '',
          location: ev.location || '',
          allDay: ev.allDay || false,
          color: color
        };
      });
      gcalEvents = liveEvents;
      setSyncStatus('ok','☁ Cal ✓');
      if(document.getElementById('calContent') && document.getElementById('calContent').style.display !== 'none'){
        renderCalendar();
      }
    }
  } catch(err){
    console.log('Calendar fetch error:',err);
    setSyncStatus('err','⚠ Cal offline');
  }
}

var TODO_KEY = 'idi_todos_v2';
var todos = [];

function loadTodos(){
  try { todos = JSON.parse(localStorage.getItem(TODO_KEY)||'[]'); } catch(e){ todos=[]; }
  // Merge auto-todos (don't duplicate)
  var existingAutoIds = todos.filter(function(t){return t.auto;}).map(function(t){return t.autoId;});
  var newAutos = buildAutoTodos();
  newAutos.forEach(function(t){
    if(existingAutoIds.indexOf(t.autoId)<0) todos.push(t);
  });
  localStorage.setItem(TODO_KEY, JSON.stringify(todos));
  renderTodo();
}

function buildAutoTodos(){
  var autos = [];
  var now = new Date();
  var in7 = new Date(now.getTime()+7*24*60*60*1000);
  // From calendar
  var calEvs = (typeof getAllCalEvents === 'function') ? getAllCalEvents() : [];
  calEvs.forEach(function(ev){
    if(!ev.start||ev.allDay) return;
    var d = new Date(ev.start.length<=10 ? ev.start+'T00:00:00' : ev.start);
    if(d<now||d>in7) return;
    var aId = 'cal_'+ev.start+'_'+ev.title.slice(0,20);
    autos.push({id:'a_'+Date.now()+'_'+Math.random(),text:ev.title,meta:formatDate(ev.start),
      done:false,urgent:d<new Date(now.getTime()+2*24*60*60*1000),auto:true,autoId:aId,category:'calendario'});
  });
  // From CRM prossimo_step
  if(typeof contacts !== 'undefined' && contacts.length){
    contacts.filter(function(c){return c.prossimo_step&&c.prossimo_step.trim()&&c.status!=='nontarget';})
    .slice(0,20).forEach(function(c){
      var aId = 'step_'+c.id;
      var urgent = c.step_urgente || ['appt1','appt2','lavorazione','expodental'].indexOf(c.status)>=0;
      autos.push({id:'a_'+c.id,text:c.prossimo_step,meta:c.studio+' \u00b7 '+(c.citta||''),
        done:false,urgent:urgent,auto:true,autoId:aId,category:'crm',cid:c.id});
    });
  }
  return autos;
}

function renderTodo(){
  pushHistory('todo', null);
  var el = document.getElementById('todoContent');
  if(!el) return;
  var urgent = todos.filter(function(t){return !t.done&&t.urgent;});
  var manual = todos.filter(function(t){return !t.done&&!t.auto&&!t.urgent;});
  var calT = todos.filter(function(t){return !t.done&&t.auto&&t.category==='calendario'&&!t.urgent;});
  var crmT = todos.filter(function(t){return !t.done&&t.auto&&t.category==='crm'&&!t.urgent;});
  var followT = todos.filter(function(t){return !t.done&&t.auto&&t.category==='followup';});
  var done = todos.filter(function(t){return t.done;}).slice(0,8);
  function row(t){
    return '<div class="todo-item'+(t.done?' done':'')+'">'+
      '<div class="todo-cb'+(t.done?' checked':'')+'" onclick="toggleTodo(\''+t.id+'\')">'+
        (t.done?'<span style="font-size:9px">&#10003;</span>':'')+
      '</div>'+
      '<div class="todo-body"'+(t.cid?' onclick="selectContact('+t.cid+');switchTab(\'contacts\',document.querySelector(\'.tab-btn\'))"':'')+'>'+
        '<div class="todo-text'+(t.urgent&&!t.done?' todo-urgent-text':'')+'">'+
          (t.urgent&&!t.done?'&#128308; ':'')+t.text+
        '</div>'+
        (t.meta?'<div class="todo-meta">'+t.meta+'</div>':'')+
      '</div>'+
      (!t.auto?'<span class="todo-del" onclick="deleteTodo(\''+t.id+'\')">&#215;</span>':'')+
    '</div>';
  }
  function sec(title,list,badge){
    if(!list.length) return '';
    return '<div class="todo-section">'+
      '<div class="todo-section-title"><span>'+title+'</span>'+
        (badge?'<span style="background:rgba(248,113,113,.2);color:#f87171;padding:1px 6px;border-radius:10px;font-size:10px">'+badge+'</span>':'')+
      '</div>'+list.map(row).join('')+'</div>';
  }
  // Update tab button color based on urgenti
  var todoBtn = document.querySelector('.tab-btn[onclick*="todo"]');
  var urgCount = todos.filter(function(t){return !t.done&&t.urgent;}).length;
  if(todoBtn){
    if(urgCount>0){ todoBtn.style.background='rgba(248,113,113,.25)'; todoBtn.style.borderColor='#f87171'; todoBtn.style.color='#f87171'; }
    else { todoBtn.style.background=''; todoBtn.style.borderColor=''; todoBtn.style.color=''; }
  }
  el.innerHTML = '<div class="todo-wrap">'+backBtn()+
    '<div class="todo-header-row">'+
      '<div class="todo-title">&#128203; To Do List</div>'+
      '<button class="btn-sync" onclick="refreshAutoTodos()" style="padding:6px 10px;font-size:12px;margin-right:4px">&#8635;</button>'+
      '<button class="todo-add-btn" onclick="openAddTodo()">+ Aggiungi</button>'+
    '</div>'+
    sec('&#128308; URGENTI',urgent,urgent.length||null)+
    sec('&#128221; Personali',manual,null)+
    sec('&#128197; Prossimi appuntamenti (7 giorni)',calT,null)+
    sec('&#129463; Prossimi step studi',crmT,null)+
    sec('&#128222; Follow-up recenti',followT,null)+
    sec('&#9989; Completati recenti',done,null)+
    (!urgent.length&&!manual.length&&!calT.length&&!crmT.length?
      '<div style="color:var(--text3);text-align:center;padding:40px 20px;font-size:13px">Tutto fatto! &#127881;</div>':'')+
  '</div>';
}

function toggleTodo(id){
  var t=todos.find(function(x){return x.id==id||x.id===id;});
  if(t){t.done=!t.done;localStorage.setItem(TODO_KEY,JSON.stringify(todos));renderTodo();}
}
function deleteTodo(id){
  todos=todos.filter(function(t){return t.id!=id&&t.id!==id;});
  localStorage.setItem(TODO_KEY,JSON.stringify(todos));renderTodo();
}
function refreshAutoTodos(){
  todos=todos.filter(function(t){return !t.auto;});
  localStorage.removeItem(TODO_KEY);
  loadTodos();
}
function openAddTodo(){
  document.getElementById('modalContent').innerHTML=
    '<h3>Nuova attivit\u00e0</h3>'+
    '<div class="modal-field"><label>Attivit\u00e0 *</label>'+
    '<input type="text" id="tdT" placeholder="es. Richiamare Cortellini..."></div>'+
    '<div class="modal-field"><label>Note / Studio</label>'+

    '<div class="modal-actions">'+

  document.getElementById('modalOverlay').style.display='flex';

function saveTodoNew(){
  var txt=document.getElementById('tdT').value.trim();
  if(!txt){alert('Inserisci il testo');return;}
  todos.unshift({id:'m_'+Date.now(),text:txt,meta:document.getElementById('tdM').value.trim(),
    done:false,urgent:!!document.getElementById('tdP').value,auto:false,category:null});
  localStorage.setItem(TODO_KEY,JSON.stringify(todos));
  closeModal();renderTodo();

var kpiPeriod = 'all';

function renderKPI(){
  if(typeof pushHistory==="function") pushHistory('kpi',null);
  var el = document.getElementById('kpiContent');
  if(!el) return;

  // ── Calcoli base ──
  var total = contacts.length;
  var byStatus = {};
  Object.keys(SC).forEach(function(k){ byStatus[k]=0; });
  contacts.forEach(function(c){ byStatus[c.status]=(byStatus[c.status]||0)+1; });

  var allEvs = [];
  contacts.forEach(function(c){ (c.eventi||[]).forEach(function(ev){ allEvs.push({ev:ev,c:c}); }); });

  var visitTypes = ['Visita','1\u00b0 Appuntamento','2\u00b0 Appuntamento','Demo','Workshop/Vision','Firma','Expodental'];
  var visite = allEvs.filter(function(x){ return visitTypes.indexOf(x.ev.type)>=0; });
  var firme = allEvs.filter(function(x){ return x.ev.type==='Firma'; });
  var appt = allEvs.filter(function(x){ return x.ev.type==='1\u00b0 Appuntamento'||x.ev.type==='2\u00b0 Appuntamento'; });

  // Tasso di conversione: Lead -> Appuntamento -> Cliente
  var nLead = total;
  var nAppt = contacts.filter(function(c){ return ['appt1','appt2','lavorazione','workshop','demo','expodental','cliente'].indexOf(c.status)>=0; }).length;
  var nLav = contacts.filter(function(c){ return ['lavorazione','workshop','demo','expodental','cliente'].indexOf(c.status)>=0; }).length;
  var nClienti = byStatus.cliente||0;

  var convRate = nLead>0 ? Math.round(nClienti/nLead*100) : 0;
  var apptRate = nLead>0 ? Math.round(nAppt/nLead*100) : 0;

  // Visite per citta
  var visiteByCitta = {};
  contacts.forEach(function(c){
    if(!c.citta) return;
    var v = (c.eventi||[]).filter(function(e){ return visitTypes.indexOf(e.type)>=0; }).length;
    visiteByCitta[c.citta] = (visiteByCitta[c.citta]||0)+v;
  });
  var cittaTop = Object.entries(visiteByCitta).sort(function(a,b){return b[1]-a[1];}).slice(0,6);
  var maxVisite = cittaTop.length ? cittaTop[0][1] : 1;

  // Studi per interesse prodotto
  var byInteresse = {};
  contacts.forEach(function(c){ if(c.interesse){byInteresse[c.interesse]=(byInteresse[c.interesse]||0)+1;} });

  // Pipeline value (stima: ogni cliente = valore simbolico)
  var pipeline = nClienti*2 + nLav*1 + (byStatus.appt2||0)*0.5;

  el.innerHTML = '<div class="kpi-wrap">'+
    '<div class="kpi-header-row">'+
      '<div style="font-size:16px;font-weight:700">&#128200; KPI & Analytics</div>'+
      '<div id="kpi-period-btns" style="display:flex;gap:4px;margin-left:auto"></div>'+
    '</div>'+

    '<div class="kpi-grid">'+
      kpiCard('blue', nLead, 'Studi totali', '&#127758;', '', 'all')+
      kpiCard('green', nClienti, 'Clienti attivi', '&#128200;', '', 'cliente')+
      kpiCard('purple', nAppt, 'Hanno fatto app.', '&#128197;', apptRate+'% del totale', null)+
      kpiCard('orange', visite.length, 'Visite CRM tot.', '&#128203;', '', null)+
      kpiCard('yellow', nLav, 'In pipeline', '&#9889;', '', 'lavorazione')+
      kpiCard('pink', convRate+'%', 'Conv. Lead>Cliente', '&#127919;', '', null)+
      kpiCard('blue', byStatus.segnalati||0, 'Segnalati priorità', '&#11088;', '', 'segnalati')+
      kpiCard('orange', byStatus.ripassare||0, 'Da ricontattare', '&#8617;', '', 'ripassare')+
    '</div>'+

    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+
      '<div class="kpi-section">'+
        '<h3>&#128205; Funnel commerciale</h3>'+
        '<div class="kpi-funnel">'+
          funnelStep('lead','Lead',byStatus.lead||0,nLead,'#64748b')+
          funnelStep('appt1','1\u00b0 Appuntamento',byStatus.appt1||0,nLead,'#0891b2')+
          funnelStep('appt2','2\u00b0 Appuntamento',byStatus.appt2||0,nLead,'#0e7490')+
          funnelStep('lavorazione','In Lavorazione',byStatus.lavorazione||0,nLead,'#7c3aed')+
          funnelStep('workshop','Workshop/Vision',byStatus.workshop||0,nLead,'#d97706')+
          funnelStep('demo','Demo',byStatus.demo||0,nLead,'#059669')+
          funnelStep('expodental','Expodental',byStatus.expodental||0,nLead,'#a855f7')+
          funnelStep('cliente','Cliente Attivo',nClienti,nLead,'#16a34a')+
        '</div>'+
      '</div>'+

      '<div class="kpi-section">'+
        '<h3>&#127758; Visite per citt\u00e0</h3>'+
        cittaTop.map(function(kv){
          var pct = Math.round(kv[1]/maxVisite*100);
          return '<div class="kpi-bar-row">'+
            '<div class="kpi-bar-label" title="'+kv[0]+'">'+kv[0]+'</div>'+
            '<div class="kpi-bar-bg"><div class="kpi-bar-fill" style="width:'+pct+'%;background:#4f8ef7"></div></div>'+
            '<div class="kpi-bar-val">'+kv[1]+'</div>'+
          '</div>';
        }).join('')+
      '</div>'+
    '</div>'+

    (Object.keys(byInteresse).length?
      '<div class="kpi-section" style="margin-top:12px">'+
        '<h3>&#128138; Interesse per prodotto</h3>'+
        '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
          Object.entries(byInteresse).map(function(kv){
            return '<div style="background:var(--glass2);border:1px solid var(--border2);border-radius:var(--r2);padding:8px 14px;text-align:center">'+
              '<div style="font-size:20px;font-weight:700;color:#a78bfa">'+kv[1]+'</div>'+
              '<div style="font-size:11px;color:var(--text2)">'+kv[0]+'</div>'+
            '</div>';
          }).join('')+
        '</div>'+
      '</div>':'')
  +'</div>';
}


function renderKPIPeriodBtns(){
  var el = document.getElementById('kpi-period-btns');
  if(!el) return;
  el.innerHTML='';
  [['month','Mese'],['year','Anno'],['all','Tutti']].forEach(function(pair){
    var btn = document.createElement('button');
    btn.textContent = pair[1];
    btn.style.cssText = 'background:'+(kpiPeriod===pair[0]?'var(--accent)':'var(--glass)')+';border:1px solid var(--border);color:'+(kpiPeriod===pair[0]?'#fff':'var(--text2)')+';border-radius:var(--r2);padding:4px 10px;font-size:11px;cursor:pointer';

function kpiCard(color, val, label, icon, trend, filterStatus){
  var attrs = filterStatus ? ' data-s="'+filterStatus+'" onclick="filterAndGo(this.dataset.s)" style="cursor:pointer"' : '';
  return '<div class="kpi-card '+color+'"'+attrs+'>'+
    '<div style="font-size:20px;margin-bottom:4px">'+icon+'</div>'+
    '<div class="kpi-n">'+val+'</div>'+
    '<div class="kpi-label">'+label+'</div>'+
    (trend?'<div class="kpi-trend">'+trend+'</div>':'')+
  '</div>';
}


function funnelStep(status, label, count, total, color){
  var pct = total>0 ? Math.round(count/total*100) : 0;
  return '<div class="kpi-funnel-step" data-s="'+status+'" onclick="filterAndGo(this.dataset.s)" style="cursor:pointer">'+
    '<div class="kpi-funnel-dot" style="background:'+color+'"></div>'+
    '<div class="kpi-funnel-label">'+label+'</div>'+
    '<div class="kpi-funnel-count" style="color:'+color+'">'+count+'</div>'+
    '<div class="kpi-funnel-pct">'+pct+'%</div>'+
  '</div>';
}

function getItiStudios(){
  var city = document.getElementById('iti-city') ? document.getElementById('iti-city').value : '';

    return ['davisitare','segnalati','lead'].indexOf(c.status) >= 0 && c.citta;
  });
  if(city) studios = studios.filter(function(c){ return c.citta.trim()===city; });
  return studios;
}

function renderItinerarioList(){
  var el = document.getElementById('iti-list');
  if(!el) return;
  var studios = getItiStudios();

    el.innerHTML='<div style="color:var(--text3);text-align:center;padding:20px">Nessuno studio trovato per questa selezione</div>';
    return;
  }
  // Ordina: prima quelli con indirizzo, poi per citta
  studios.sort(function(a,b){
    if(a.via && !b.via) return -1;
    if(!a.via && b.via) return 1;
    return a.citta.localeCompare(b.citta);
  });
  var html = '<div class="iti-section">'+
    '<div style="font-size:11px;color:var(--text2);margin-bottom:10px;font-weight:600">'+
      studios.length+' STUDI &mdash; clicca per aprire la scheda'+

  studios.forEach(function(studio, i){
    var addr = studio.via ? studio.via+', '+studio.citta : studio.citta;
    var tel = studio.tel || studio.tel_professionista || '';
    html += '<div class="iti-stop" onclick="selectContact('+studio.id+');switchTab(\'contacts\',document.querySelector(\'.tab-btn\'))" style="cursor:pointer">'+
      '<div class="iti-num">'+(i+1)+'</div>'+
      '<div class="iti-body">'+
        '<div class="iti-studio">'+studio.studio+'</div>'+
        '<div class="iti-detail">'+
          (studio.dott?'<span style="color:var(--accent)">'+studio.dott+'</span> &mdash; ':'')+
          addr+
        '</div>'+
        (tel?'<div class="iti-tel">&#128222; '+tel+'</div>':'')+
        (studio.note?'<div class="iti-detail" style="margin-top:3px;font-style:italic">'+studio.note.slice(0,80)+'</div>':'')+
      '</div>'+
      '<div style="font-size:10px;background:rgba(79,142,247,.1);color:var(--accent);padding:2px 7px;border-radius:8px;flex-shrink:0">'+

function openItinerarioMaps(){
  var studios = getItiStudios();
  var start = document.getElementById('iti-start') ? document.getElementById('iti-start').value.trim() : '';
  var addresses = studios.filter(function(s){return s.via||s.citta;}).map(function(s){ return s.via ? s.via+', '+s.citta : s.citta; });
  if(!addresses.length){ alert('Nessuno studio con indirizzo trovato'); return; }
  var origin = start || addresses.shift();
  var dest = addresses.pop() || origin;
  var wps = addresses.slice(0,8).join('|');
  var url = 'https://www.google.com/maps/dir/?api=1&origin='+encodeURIComponent(origin)+'&destination='+encodeURIComponent(dest)+(wps?'&waypoints='+encodeURIComponent(wps):'')+'&travelmode=driving';
  window.open(url,'_blank');
}

function openAppleMaps(){
  var studios = getItiStudios();
  var addresses = studios.filter(function(s){return s.via||s.citta;}).map(function(s){ return s.via ? s.via+', '+s.citta : s.citta; });
  if(!addresses.length){ alert('Nessuno studio con indirizzo trovato'); return; }
  var q = addresses.slice(0,5).join('+to:');
  var url = 'https://maps.apple.com/?q='+encodeURIComponent(q);
  window.open(url,'_blank');
}

    '<div id="recap-results"></div>'+

function setRecapPeriod(days){
  var now = new Date();
  var from = new Date(now.getTime()-days*24*60*60*1000);
  var fEl = document.getElementById('recap-from');
  var tEl = document.getElementById('recap-to');
  if(fEl) fEl.value = from.toISOString().slice(0,10);
  if(tEl) tEl.value = now.toISOString().slice(0,10);
  buildRecap();
}

function buildRecap(){
  var el = document.getElementById('recap-results');
  if(!el) return;
  var fromEl = document.getElementById('recap-from');
  var toEl = document.getElementById('recap-to');
  if(!fromEl||!toEl) return;
  var from = fromEl.value;
  var to = toEl.value+'T23:59:59';

  // Trova tutte le azioni nel periodo
  var results = [];
  var visitTypes = ['1a Visita','Visita','1\u00b0 Appuntamento','2\u00b0 Appuntamento','Demo','Workshop/Vision','Firma','Expodental'];
  contacts.forEach(function(c){
    var evs = (c.eventi||[]).filter(function(e){
      return e.date && e.date >= from && e.date <= to;
    });
    if(evs.length) results.push({contact:c, eventi:evs});
  });

  if(!results.length){
    el.innerHTML='<div style="color:var(--text3);text-align:center;padding:40px;font-size:13px">Nessuna azione trovata nel periodo selezionato</div>';
    return;
  }

  // Stats
  var totEv = results.reduce(function(s,r){return s+r.eventi.length;},0);
  var totVisite = results.reduce(function(s,r){
    return s+r.eventi.filter(function(e){return visitTypes.indexOf(e.type)>=0;}).length;
  },0);
  var totFirme = results.reduce(function(s,r){
    return s+r.eventi.filter(function(e){return e.type==='Firma';}).length;
  },0);
  var studioUnici = results.length;

  var statsHtml = '<div class="recap-stats">'+
    '<div class="recap-stat"><div class="recap-stat-n">'+totEv+'</div><div class="recap-stat-l">Azioni totali</div></div>'+

function copyReportText(){
  var content = document.getElementById('report-content');
  if(!content){ alert('Genera prima il report'); return; }
  var text = content.innerText;
  try{ navigator.clipboard.writeText(text).then(function(){alert('Testo copiato!');}).catch(function(){ promptCopy(text); }); }
  catch(e){ promptCopy(text); }
}

function promptCopy(text){
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position='fixed';ta.style.top='-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  alert('Testo del report copiato!');
}

function doneStep(cid){
  var contact = contacts.find(function(x){return x.id===cid;});
  if(!contact) return;
  if(!contact.step_done){
    // Segna come fatto: salva il testo originale per poterlo ripristinare
    contact.step_done = true;
    contact.step_done_text = contact.prossimo_step || '';
    if(contact.prossimo_step && contact.prossimo_step.trim()){
      if(!contact.eventi) contact.eventi=[];
      contact.eventi.push({
        id: Date.now(),
        type: '1a Visita',
        date: new Date().toISOString().slice(0,16),
        note: contact.prossimo_step,
        done: true
      });
      contact.eventi.sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    }
    // Svuota prossimo step
    contact.prossimo_step = '';
  } else {
    // Riapri: ripristina il testo originale
    contact.step_done = false;
    if(contact.step_done_text){
      contact.prossimo_step = contact.step_done_text;
      contact.step_done_text = '';
    }
  }
  scheduleSave();
  selectContact(cid);
  renderList();
  updateStepBanner();
}

function toggleEventDone(cid, evid){
  var contact = contacts.find(function(x){return x.id===cid;});
  if(!contact) return;
  var ev = (contact.eventi||[]).find(function(e){return String(e.id)===String(evid);});
  if(!ev) return;
  ev.done = !ev.done;
  scheduleSave();
  selectContact(cid); // re-render
}

    '<div class="modal-actions">'+

function saveEventEdit(cid, evid){
  var contact = contacts.find(function(x){return x.id===cid;});
  if(!contact) return;
  var ev = (contact.eventi||[]).find(function(e){return String(e.id)===String(evid);});
  if(!ev) return;
  var typeEl = document.getElementById('ee-type');
  var dateEl = document.getElementById('ee-date');
  var noteEl = document.getElementById('ee-note');
  if(typeEl && typeEl.value) ev.type = typeEl.value;
  if(dateEl && dateEl.value) ev.date = dateEl.value;
  if(noteEl) ev.note = noteEl.value.trim();
  scheduleSave();
  closeModal();
  selectContact(cid);
}

    '</svg>Indietro</button>';
}

function pushHistory(tab, contactId){
  var last = navHistory[navHistory.length-1];
  // Non aggiungere se uguale all'ultimo
  if(last && last.tab===tab && last.cid==contactId) return;
  navHistory.push({tab:tab, cid:contactId||null});
  if(navHistory.length > 30) navHistory.shift();
}

function goBack(){
  navHistory.pop(); // rimuovi la pagina corrente
  var prev = navHistory[navHistory.length-1];
  if(!prev){
    // Nessuna history: torna alla lista studi
    activeTab = 'contacts';
    selectedId = null;
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
    var contactsBtn = document.querySelector('.tab-btn[onclick*="contacts"]');
    if(contactsBtn) contactsBtn.classList.add('active');
    document.getElementById('mainContent').style.display='';
    document.getElementById('dashContent').style.display='none';
    document.getElementById('calContent').style.display='none';
    document.getElementById('todoContent').style.display='none';
    document.getElementById('kpiContent').style.display='none';
  document.getElementById('itinerarioContent').style.display='none';
  document.getElementById('recapContent').style.display='none';
  document.getElementById('reportContent').style.display='none';
    document.getElementById('mainContent').innerHTML='<div class="empty-state"><p style="font-size:32px">&#129463;</p><p>Seleziona uno studio dalla lista</p></div>';
    renderList();
    return;
  }
  // Vai alla tab precedente
  activeTab = prev.tab;
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  var btn = document.querySelector('.tab-btn[onclick*="'+prev.tab+'"]');
  if(btn) btn.classList.add('active');
  // Mostra/nascondi sezioni
  document.getElementById('mainContent').style.display = prev.tab==='contacts'?'':'none';
  document.getElementById('dashContent').style.display = prev.tab==='dashboard'?'':'none';
  document.getElementById('calContent').style.display = prev.tab==='calendar'?'':'none';
  document.getElementById('todoContent').style.display = prev.tab==='todo'?'':'none';
  document.getElementById('kpiContent').style.display = prev.tab==='kpi'?'':'none';
  // Se era su un contatto specifico
  if(prev.tab==='contacts' && prev.cid){
    selectedId = prev.cid;
    var prevC = contacts.find(function(x){return x.id===prev.cid;});
    if(prevC) renderProfile(prevC);
  } else if(prev.tab==='contacts'){
    selectedId = null;
    document.getElementById('mainContent').innerHTML='<div class="empty-state"><p style="font-size:32px">&#129463;</p><p>Seleziona uno studio dalla lista</p></div>';
  } else if(prev.tab==='dashboard'){
    renderDashboard();
  } else if(prev.tab==='calendar'){
    renderCalendar();
  } else if(prev.tab==='todo'){
    renderTodo();
  } else if(prev.tab==='kpi'){
    renderKPI();
  } else if(prev.tab==='itinerario'){
    renderItinerario();
  } else if(prev.tab==='recap'){
    renderRecap();
  } else if(prev.tab==='report'){
    renderReport();
  }
  renderList();
}

<script id="d_gas" type="application/json">"function doGet(e) {
  var action = e.parameter.action;
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"IDI_CRM\") || SpreadsheetApp.getActiveSpreadsheet().insertSheet(\"IDI_CRM\");
  
  if(action === \"gcal\") {
    // Return Google Calendar events
    var cal = CalendarApp.getDefaultCalendar();
    var now = new Date();
    var future = new Date(now.getTime() + 90*24*60*60*1000); // 90 days
    var events = cal.getEvents(now, future);
    var result = events.map(function(ev) {
      return {
        title: ev.getTitle(),
        start: ev.getStartTime().toISOString(),
        end: ev.getEndTime().toISOString(),
        note: ev.getDescription() || \"\",
        location: ev.getLocation() || \"\"
      };
    });
    return ContentService.createTextOutput(JSON.stringify({events: result})).setMimeType(ContentService.MimeType.JSON);
  }
  
  var data = sheet.getRange(\"A1\").getValue();
  return ContentService.createTextOutput(JSON.stringify({data: data})).setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  try {
    var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\"IDI_CRM\") || SpreadsheetApp.getActiveSpreadsheet().insertSheet(\"IDI_CRM\");
    var payload = JSON.parse(e.postData.contents);
    if (payload.action === \"save\") {
      sheet.getRange(\"A1\").setValue(payload.data);
      sheet.getRange(\"B1\").setValue(new Date().toISOString());
    }
    return ContentService.createTextOutput(JSON.stringify({ok: true})).setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService.createTextOutput(JSON.stringify({error: err.toString()})).setMimeType(ContentService.MimeType.JSON);
  }
